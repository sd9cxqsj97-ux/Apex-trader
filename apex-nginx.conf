server {
    listen 80;
    root /var/www/html;
    index index.html;
    auth_basic "APEX Trading";
    auth_basic_user_file /etc/nginx/.apex_pass;
    location / {
        try_files $uri $uri/ =404;
    }
    location /oanda/ {
        proxy_pass http://localhost:5000/oanda/;
    }
    location /binance/ {
        proxy_pass http://localhost:5000/binance/;
    }
}
