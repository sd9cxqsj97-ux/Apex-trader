<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX Trading Intelligence</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // Example of how to interact with the API
        function fetchData(endpoint) {
            return $.get('http://localhost:5000/oanda/' + endpoint)
                .fail(function() {
                    alert('OANDA connection failed');
                });
        }

        $(document).ready(function() {
            // Fetch data when the document is ready
            fetchData('some_endpoint'); // Replace 'some_endpoint' with your actual endpoint
        });
    </script>
</head>
<body>
    <h1>APEX Trading Intelligence</h1>
    <div id="data"></div>
</body>
</html>
